# fuzzel.ini - Styling Configuration
# Colors based on provided palette

# Basic styling options
lines=24
width=50            # Breiter für zwei Spalten
lines=12            # Mehr Zeilen für bessere Übersicht
prompt="   "   
dpi-aware=yes
placeholder=(=^･ｪ･^=)
lines=24
tabs=20



[colors]
# Hintergrund mit 80% Opazität (halbtransparent)
background=1a0a14cc  # base00 mit Transparenz

# Textfarben
text=e8d2b8ff        # base05 für normalen Text
match=6b84d1ff       # base0B für hervorgehobene Matches
selection-match=8a6dc7ff  # base0A für ausgewählte Matches

# Auswahl-Hintergrund (heller, leicht transparent)
selection=3d2434cc    # base02 mit Transparenz
selection-text=e8c3d9ff   # base07 für ausgewählten Text

# Rahmen und Trenner
border=3d2434ff       # base02 für Rahmen

# Platzhalter
placeholder=b13d8cff  # base03 für Prompt/Sucheingabe

# Eingabefeld
input=e8d2b8ff        # base05 für Eingabetext

# Zusätzliche Akzente
counter=d67db3ff      # base0D für Ergebnisanzahl